<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Playlist de Álbuns & Músicas</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">

    <h1>Álbuns e Músicas</h1>

    <div class="top-buttons">
      <button id="clearAll">Limpar Tudo</button>
    </div>

    <div class="input-area">
      <input type="text" id="taskInput" placeholder="Digite algo">
      <button id="addBtn">Adicionar</button>
    </div>

    <p>Total de itens na lista: <span id="taskCount">0</span></p>

    <ul id="taskList"></ul>

  </div>
  <script src="index.js"></script>
</body>
</html>
